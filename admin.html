  <!-- 现代 SaaS 隐藏式细滚动条 -->

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }

  <div class="flex flex-col lg:flex-row w-full h-full p-2 md:p-3 gap-3 overflow-y-auto lg:overflow-hidden custom-scrollbar">

    <!-- 左侧：历史排单 (Sidebar) -->
    <div class="w-full lg:w-72 h-[350px] lg:h-full flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden shrink-0 relative">
      <!-- Header -->
      <div class="p-4 border-b border-slate-100 bg-white/80 backdrop-blur-md sticky top-0 z-10">
        <h2 class="text-base font-bold text-slate-800 flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

        <!-- JS 渲染区域 -->
      </div>
    </div>

    <!-- 中间：曲库区 (Library) -->

            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
            曲库 (Library)

          <button onclick="openAddSongModal()" class="px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold rounded-lg transition-colors flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>

            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
          <input type="text" id="search-input" placeholder="输入拼音首字母或歌名搜索..." class="w-full pl-9 pr-4 py-2 bg-slate-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-xl text-sm transition-all">

        <!-- JS 渲染区域 -->

    window.init = async function() {

      try {
        const querySnapshot = await getDocs(collection(db, "custom_songs"));
        querySnapshot.forEach((doc) => {
          if (!LIBRARY_DATA.find(s => s.id === doc.id)) {
            LIBRARY_DATA.push(doc.data());
          }
        });
      } catch (e) {
        console.log("加载自定义歌曲失败", e);
      }

      // 2. 渲染界面
      window.renderLibrary();
      window.renderSetlist();
      window.loadHistory();
      if(searchInput) searchInput.addEventListener('input', window.renderLibrary);
    };

          <div class="flex items-center gap-1.5 shrink-0 opacity-80 group-hover:opacity-100 transition-opacity">
            <button class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" onclick="window.openPreview('${song.id}')" title="预览">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            </button>
            <button class="px-3 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white text-xs font-bold rounded-lg transition-colors" onclick="window.addToSetlist('${song.id}')">
              添加
            </button>
          </div>
        `;
        libraryListEl.appendChild(item);
      });
    };


    window.addToSetlist = function(id) {
      const song = LIBRARY_DATA.find(s => s.id === id);
      if (!song) return;
      const setlistItem = { ...song, uuid: Date.now().toString() + Math.random() };
      currentSetlist.push(setlistItem);
      window.renderSetlist();
    };

    window.removeFromSetlist = function(uuid) {
      currentSetlist = currentSetlist.filter(item => item.uuid !== uuid);
      window.renderSetlist();
    };

    window.moveItem = function(index, direction) {
      if (direction === 'up' && index > 0) {
        const temp = currentSetlist[index];
        currentSetlist[index] = currentSetlist[index - 1];
        currentSetlist[index - 1] = temp;
      } else if (direction === 'down' && index < currentSetlist.length - 1) {
        const temp = currentSetlist[index];
        currentSetlist[index] = currentSetlist[index + 1];
        currentSetlist[index + 1] = temp;
      }
      window.renderSetlist();
    };

    // --- 拖拽排序全局变量 ---
    let dragStartIndex = null;

    // --- 渲染当前排单 (支持拖拽) ---
    window.renderSetlist = function() {
      setlistAreaEl.innerHTML = '';
      setlistCountEl.textContent = `${currentSetlist.length} 首曲目`;

      if (currentSetlist.length === 0) {
        setlistAreaEl.innerHTML = `
          <div class="flex flex-col items-center justify-center py-16 text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
            <svg class="w-10 h-10 mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <p class="text-sm font-medium">排单为空，请从左侧添加</p>
          </div>`;
        return;
      }

      currentSetlist.forEach((item, index) => {
        const card = document.createElement('div');
        // 增加 draggable 属性和抓取手势 (cursor-grab)
        card.className = "group flex items-stretch bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 transition-all overflow-hidden cursor-grab active:cursor-grabbing";
        card.draggable = true;
        card.dataset.index = index; // 记录当前索引
        
        card.innerHTML = `
          <div class="w-10 flex flex-col items-center justify-center bg-slate-50/80 border-r border-slate-100 py-2 shrink-0 text-slate-300 group-hover:text-indigo-400 transition-colors">
            <!-- 拖拽手柄图标 (六个点) -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9h.01M8 15h.01M16 9h.01M16 15h.01M12 9h.01M12 15h.01"></path></svg>
            <span class="text-[10px] font-bold mt-1 text-slate-400">${index + 1}</span>
          </div>
          <div class="flex-1 p-3 flex justify-between items-center pointer-events-none">
            <span class="font-semibold text-slate-700 text-sm pl-1">${item.title}</span>
          </div>
          <div class="flex items-center pr-2">
            <!-- 删除按钮 (阻止拖拽事件冒泡) -->
            <button onclick="event.stopPropagation(); window.removeFromSetlist('${item.uuid}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="移除">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          </div>
        `;

        // --- 绑定拖拽事件 ---
        card.addEventListener('dragstart', function(e) {
          dragStartIndex = +this.dataset.index;
          e.dataTransfer.effectAllowed = 'move';
          // 拖拽时的视觉反馈：半透明 + 缩小
          setTimeout(() => this.classList.add('opacity-40', 'scale-95'), 0);
        });

        card.addEventListener('dragover', function(e) {
          e.preventDefault(); // 必须阻止默认行为才能触发 drop
          e.dataTransfer.dropEffect = 'move';
          // 拖拽经过时的目标高亮
          this.classList.add('border-indigo-500', 'bg-indigo-50/50');
        });

        card.addEventListener('dragleave', function(e) {
          // 离开目标时取消高亮
          this.classList.remove('border-indigo-500', 'bg-indigo-50/50');
        });

        card.addEventListener('drop', function(e) {
          e.stopPropagation();
          this.classList.remove('border-indigo-500', 'bg-indigo-50/50');
          
          const dragEndIndex = +this.dataset.index;
          
          // 如果位置发生了改变，则重新排序数组
          if (dragStartIndex !== dragEndIndex && dragStartIndex !== null) {
            const draggedItem = currentSetlist.splice(dragStartIndex, 1)[0];
            currentSetlist.splice(dragEndIndex, 0, draggedItem);
            window.renderSetlist(); // 重新渲染
          }
          return false;
        });

        card.addEventListener('dragend', function(e) {
          // 拖拽结束，恢复视觉
          this.classList.remove('opacity-40', 'scale-95');
          dragStartIndex = null;
        });

        setlistAreaEl.appendChild(card);
      });
    };



// --- 预览弹窗逻辑 (带缩放动画) ---
    window.openPreview = function(id) {
      const song = LIBRARY_DATA.find(s => s.id === id);
      if (!song) return;
      modalTitle.innerHTML = `
        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
        ${song.title}
      `;
      modalImage.src = song.imageUrl;
      
      const content = document.getElementById('preview-modal-content');
      previewModal.classList.remove('hidden');
      void previewModal.offsetWidth; // 触发重绘
      
      // 背景淡入，内容放大
      previewModal.classList.remove('opacity-0');
      previewModal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    };

    window.closeModal = function() {
      const content = document.getElementById('preview-modal-content');
      
      // 背景淡出，内容缩小
      previewModal.classList.remove('opacity-100');
      previewModal.classList.add('opacity-0');
      content.classList.remove('scale-100');
      content.classList.add('scale-95');
      
      setTimeout(() => {
        previewModal.classList.add('hidden');
        modalImage.src = ''; 
      }, 300);
    };

    // --- 历史排单逻辑 ---
    window.loadHistory = async function() {
      // 优化：加载中的动画状态
      historyListEl.innerHTML = `
        <div class="flex flex-col items-center justify-center py-10 text-slate-400">
          <svg class="w-6 h-6 mb-3 animate-spin opacity-50" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <span class="text-xs font-medium">加载中...</span>
        </div>`;
        
      try {
        const querySnapshot = await getDocs(collection(db, "setlists"));
        historyListEl.innerHTML = '';
        
        if (querySnapshot.empty) {
          // 优化：空状态的虚线框和图标
          historyListEl.innerHTML = `
            <div class="flex flex-col items-center justify-center py-10 text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50 mx-1 mt-2">
              <svg class="w-8 h-8 mb-2 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
              <span class="text-xs font-medium">暂无历史排单</span>
            </div>`;
          return;
        }

        let historyItems = [];
        querySnapshot.forEach((doc) => {
          historyItems.push({ id: doc.id, ...doc.data() });
        });

        historyItems.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        historyItems.forEach(item => {
          const div = document.createElement('div');
          // 优化：卡片化，增加左侧高亮条的潜台词
          div.className = "group p-3.5 bg-white rounded-xl border border-slate-100 hover:border-indigo-200 hover:shadow-md hover:shadow-indigo-500/5 transition-all cursor-pointer relative overflow-hidden";
          
          const dateStr = new Date(item.createdAt).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
          
          div.innerHTML = `
            <!-- Hover 时的左侧强调线 -->
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            
            <div class="flex justify-between items-start mb-2" onclick="window.loadSetlist('${item.id}')" title="点击加载此排单">
              <div class="flex items-start gap-2 pr-2">
                <svg class="w-4 h-4 text-slate-400 mt-0.5 shrink-0 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="font-bold text-slate-700 text-sm group-hover:text-indigo-700 transition-colors leading-tight">${item.name}</span>
              </div>
            </div>
            <div class="flex justify-between items-center mt-1 pl-6">
              <div class="flex items-center gap-2">
                <span class="text-[11px] font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">${item.items.length} 首</span>
                <span class="text-[11px] text-slate-400">${dateStr}</span>
              </div>
              <button onclick="event.stopPropagation(); window.deleteSetlist('${item.id}')" class="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-all opacity-0 group-hover:opacity-100" title="删除排单">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
              </button>
            </div>
          `;
          historyListEl.appendChild(div);
        });
      } catch (error) {
        console.error("获取历史排单失败:", error);
        // 优化：失败状态的图标
        historyListEl.innerHTML = `
          <div class="flex flex-col items-center justify-center py-10 text-red-400">
            <svg class="w-8 h-8 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-xs font-medium">加载失败，请重试</span>
          </div>`;
      }
    };


    window.loadSetlist = function(id) {
      if(confirm(`确定要加载排单【${id}】吗？当前未发布的排单将被覆盖。`)) {
        getDocs(collection(db, "setlists")).then(snapshot => {
          snapshot.forEach(doc => {
            if(doc.id === id) {
              const data = doc.data();
              document.getElementById('setlist-name').value = data.name;
              currentSetlist = data.items.map(song => ({ ...song, uuid: Date.now().toString() + Math.random() }));
              window.renderSetlist();
            }
          });
        });
      }
    };

    window.deleteSetlist = async function(id) {
      if(confirm(`🚨 警告：确定要永久删除排单【${id}】吗？此操作不可恢复！`)) {
        try {
          // 注意：这里需要确保顶部 import 了 deleteDoc
          // import { ..., deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
          await deleteDoc(doc(db, "setlists", id ));
          alert(`✅ 已删除排单：${id}`);
          window.loadHistory(); 
        } catch (error) {
          console.error("删除失败:", error);
          alert("❌ 删除失败，请检查网络。");
        }
      }
    };

    window.handlePublish = async function() {
      if (currentSetlist.length === 0) {
        alert("排单为空，不能发布！");
        return;
      }
      const setNameInput = document.getElementById('setlist-name').value.trim();
      if (!setNameInput) {
        alert("请先输入排单名称！（例如：5月10日 常年期）");
        return;
      }

      const payload = currentSetlist.map((item, index) => ({
        id: item.id, order: index + 1, title: item.title, imageUrl: item.imageUrl
      }));

      try {
        const docRef = doc(db, "setlists", setNameInput);
        await setDoc(docRef, {
          name: setNameInput,
          createdAt: new Date().toISOString(),
          items: payload
        });
        alert(`🎉 成功发布/保存排单：【${setNameInput}】！`);
        window.loadHistory(); 
      } catch (error) {
        console.error("发布失败: ", error);
        alert("❌ 发布失败，请检查网络连接。");
      }
    };

// --- 智能批量上传弹窗逻辑 (带缩放动画) ---
    window.openAddSongModal = function() {
      document.getElementById('new-song-file').value = '';
      const content = document.getElementById('add-song-modal-content');
      
      addSongModal.classList.remove('hidden');
      void addSongModal.offsetWidth; // 触发重绘
      
      // 背景淡入，内容放大
      addSongModal.classList.remove('opacity-0');
      addSongModal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    };

    window.closeAddSongModal = function() {
      const content = document.getElementById('add-song-modal-content');
      
      // 背景淡出，内容缩小
      addSongModal.classList.remove('opacity-100');
      addSongModal.classList.add('opacity-0');
      content.classList.remove('scale-100');
      content.classList.add('scale-95');
      
      setTimeout(() => addSongModal.classList.add('hidden'), 300);
    };

    window.uploadAndSaveSong = async function() {
      const fileInput = document.getElementById('new-song-file');
      const btn = document.getElementById('btn-upload-save');

      if (!fileInput.files || fileInput.files.length === 0) {
        alert("请先选择至少一张乐谱图片！");
        return;
      }

      const files = fileInput.files;
      const total = files.length;
      let successCount = 0;
      let updateCount = 0;
      
      // 按钮变成加载状态
      btn.disabled = true;
      btn.classList.replace('bg-emerald-500', 'bg-slate-400');

      // 循环处理每一张照片
      for (let i = 0; i < total; i++) {
        const file = files[i];
        // 自动读取文件名，去掉 .jpg/.png 后缀，直接作为歌名
        let cleanName = file.name.replace(/\.[^/.]+$/, ""); 
        
        // 在按钮上显示进度
        btn.innerHTML = `正在上传 (${i + 1}/${total}): ${cleanName}...`;

        try {
          // 1. 上传到 Cloudinary
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', 'ml_default');

          const cloudRes = await fetch('https://api.cloudinary.com/v1_1/dsfhilcgz/image/upload', {
            method: 'POST',
            body: formData
          } );
          const cloudData = await cloudRes.json();
          
          if (!cloudData.secure_url) throw new Error("Cloudinary 上传失败");
          const imageUrl = cloudData.secure_url;

          // 2. 检查是否已存在同名歌曲 (智能覆盖)
          let existingIndex = LIBRARY_DATA.findIndex(s => s.title === cleanName);
          let songId = "song_custom_" + Date.now() + "_" + i; 
          let isUpdate = false;

          if (existingIndex !== -1) {
            songId = LIBRARY_DATA[existingIndex].id; // 发现同名，使用旧ID覆盖
            isUpdate = true;
          }

          const songData = { id: songId, title: cleanName, imageUrl: imageUrl };

          // 3. 永久保存到 Firebase
          await setDoc(doc(db, "custom_songs", songId), songData);

          // 4. 更新左侧列表数据
          if (isUpdate) {
            LIBRARY_DATA[existingIndex].imageUrl = imageUrl;
            updateCount++;
          } else {
            LIBRARY_DATA.push(songData);
            successCount++;
          }
        } catch (error) {
          console.error(`上传 ${cleanName} 失败:`, error);
        }
      }

      // 恢复按钮状态并刷新列表
      btn.disabled = false;
      btn.innerHTML = `开始批量上传`;
      btn.classList.replace('bg-slate-400', 'bg-emerald-500');
      
      window.renderLibrary();
      window.closeAddSongModal();
      
      // 弹出最终报告
      alert(`✅ 批量处理完成！\n新增: ${successCount} 首\n覆盖更新: ${updateCount} 首`);
    };


    document.addEventListener('DOMContentLoaded', window.init);
  </script>
</body>
