<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐韵歌咏团 - 乐谱同步</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 h-screen flex flex-col font-sans select-none overflow-hidden">

  <!-- 顶部悬浮导航栏 -->
  <header class="absolute top-4 left-4 right-4 z-50 flex justify-between items-center px-5 py-3 bg-zinc-900/80 backdrop-blur-2xl border border-white/10 rounded-2xl shadow-2xl transition-all duration-300">
    
    <!-- 左侧：排单选择 -->
    <div class="flex items-center gap-3 w-1/3">
      <div class="relative w-full max-w-[220px]">
        <select id="setlist-select" class="w-full appearance-none bg-zinc-800/60 text-zinc-200 border border-white/10 text-sm font-medium rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent block px-4 py-2.5 pr-8 outline-none transition-all cursor-pointer hover:bg-zinc-800 shadow-inner">
          <option value="">加载排单中...</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-zinc-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
      </div>
    </div>

    <!-- 中间：当前曲名 -->
    <div class="flex-1 flex justify-center text-center pointer-events-none">
      <h1 id="song-title" class="text-base md:text-lg font-bold text-white truncate tracking-wide drop-shadow-md">加载中...</h1>
    </div>

    <!-- 右侧：操作按钮 -->
    <div class="flex items-center justify-end gap-3 w-1/3">
      <button id="btn-draw" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-zinc-800/80 text-zinc-300 text-sm font-semibold hover:bg-zinc-700 hover:text-white border border-white/5 transition-all shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        <span class="hidden md:inline">标注</span>
        <span id="draw-status" class="text-[10px] bg-zinc-950 text-zinc-400 px-2 py-0.5 rounded-full uppercase tracking-wider border border-white/10">OFF</span>
      </button>
      
      <button id="btn-sync" class="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white text-sm font-bold rounded-xl shadow-lg shadow-indigo-500/25 transition-all border border-indigo-400/30">
        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
        <span class="hidden md:inline">Sync</span>
      </button>
    </div>
  </header>

  <!-- 底部悬浮画笔工具栏 -->
  <div id="draw-tools" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-50 items-center gap-2 p-2 bg-zinc-800/95 backdrop-blur-2xl border border-white/10 rounded-full shadow-2xl">
    <button class="color-btn w-10 h-10 rounded-full bg-red-500 ring-2 ring-offset-2 ring-offset-zinc-800 ring-white transition-all shadow-sm hover:scale-110" data-color="rgba(239, 68, 68, 0.8 )" data-width="4" title="红笔"></button>
    <button class="color-btn w-10 h-10 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-offset-zinc-800 ring-transparent transition-all shadow-sm hover:scale-110" data-color="rgba(59, 130, 246, 0.8)" data-width="4" title="蓝笔"></button>
    <button class="color-btn w-10 h-10 rounded-full bg-zinc-900 border border-zinc-600 ring-2 ring-offset-2 ring-offset-zinc-800 ring-transparent transition-all shadow-sm hover:scale-110" data-color="rgba(30, 41, 59, 0.8)" data-width="4" title="黑笔"></button>
    <button class="color-btn w-10 h-10 rounded-full bg-yellow-400 ring-2 ring-offset-2 ring-offset-zinc-800 ring-transparent transition-all shadow-sm flex items-center justify-center hover:scale-110" data-color="rgba(250, 204, 21, 0.4)" data-width="20" title="高亮笔">
      <span class="text-[11px] font-black text-yellow-900">粗</span>
    </button>
    
    <div class="w-px h-8 bg-white/10 mx-2"></div>
    
    <button id="btn-eraser" class="p-2.5 rounded-full text-zinc-400 hover:bg-zinc-700 hover:text-white ring-2 ring-transparent transition-all" title="橡皮擦">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
    </button>
    <button id="btn-clear" class="p-2.5 rounded-full text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-colors" title="清空本页">
      <span class="text-xs font-bold px-1">清空</span>
    </button>
  </div>

  <!-- 主体乐谱查看区 -->
  <!-- 关键修复：slide-container 必须作为 canvas 的绝对定位参考系 -->
  <main id="slide-container" class="flex-1 relative w-full h-full overflow-hidden bg-zinc-950 flex justify-center items-center">
    
    <!-- 左右翻页按钮 -->
    <button id="btn-prev" class="fixed left-6 top-1/2 -translate-y-1/2 z-40 bg-zinc-800/40 hover:bg-zinc-700/80 text-white/70 hover:text-white p-4 rounded-full backdrop-blur-md border border-white/10 transition-all hidden md:block shadow-xl">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <button id="btn-next" class="fixed right-6 top-1/2 -translate-y-1/2 z-40 bg-zinc-800/40 hover:bg-zinc-700/80 text-white/70 hover:text-white p-4 rounded-full backdrop-blur-md border border-white/10 transition-all hidden md:block shadow-xl">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
    </button>

    <!-- 乐谱图片 -->
    <img id="score-image" src="" alt="Score" class="max-w-full max-h-full object-contain bg-white shadow-2xl shadow-black/60 rounded-xl select-none pointer-events-none z-10" draggable="false">
    
    <!-- 标注画布：绝对定位铺满整个 slide-container，确保 JS 里的坐标计算完全准确 -->
    <canvas id="draw-canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none z-20"></canvas>
    
  </main>

  <script type="module" src="src/app.js"></script>
  <script>
    // ==========================================
    // 【A】沉浸模式 (Immersive Mode)
    // ==========================================
    const header = document.querySelector('header');
    const slideContainer = document.getElementById('slide-container');
    
    slideContainer.addEventListener('click', (e) => {
      // 如果点击的是画板(正在标注)或按钮，则不触发隐藏
      if (e.target.tagName.toLowerCase() === 'canvas' || e.target.closest('button')) return;
      
      // 丝滑隐藏/显示顶部导航栏
      header.classList.toggle('opacity-0');
      header.classList.toggle('pointer-events-none');
      header.classList.toggle('-translate-y-8');
    });

    // ==========================================
    // 【B】防息屏功能 (Wake Lock API)
    // ==========================================
    let wakeLock = null;
    const requestWakeLock = async () => {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('☀️ 防息屏已激活，弥撒中绝不黑屏！');
        }
      } catch (err) {
        console.error('防息屏请求失败:', err);
      }
    };
    
    // 当用户切换 App 再切回来时，重新激活防息屏
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
    
    // 页面加载时立刻请求
    requestWakeLock();
  </script>
</body>
</html>
