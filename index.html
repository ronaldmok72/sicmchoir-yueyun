<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐韵歌咏团 - 乐谱同步</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 h-[100dvh] flex flex-col font-sans select-none overflow-hidden">
  <!-- 退出全屏按钮 (仅在演出模式显示，悬浮在右上角) -->
  <button id="btn-unlock" class="fixed top-6 right-6 z-[60] p-3 bg-zinc-900/50 backdrop-blur-md text-white/30 hover:text-white hover:bg-zinc-800/80 rounded-full border border-white/10 transition-all hidden shadow-xl" title="退出全屏">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25"></path>
    </svg>
  </button>


  <!-- 顶部悬浮导航栏 (响应式优化版) -->
  <header class="absolute top-2 left-2 right-2 md:top-4 md:left-4 md:right-4 z-50 flex justify-between items-center px-3 py-2 md:px-5 md:py-3 bg-zinc-900/80 backdrop-blur-2xl border border-white/10 rounded-2xl shadow-2xl transition-all duration-300">
    
    <!-- 左侧：排单选择 (手机端变窄) -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <div class="relative w-28 md:w-48">
        <select id="setlist-select" class="w-full appearance-none bg-zinc-800/60 text-zinc-200 border border-white/10 text-xs md:text-sm font-medium rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent block px-2 md:px-4 py-2 pr-6 md:pr-8 outline-none transition-all cursor-pointer hover:bg-zinc-800 shadow-inner truncate">
          <option value="">加载中...</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-zinc-400">
          <svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
      </div>
    </div>

    <!-- 中间：当前曲名 (点击呼出列表) -->
    <div id="btn-song-list" class="flex-1 min-w-0 px-2 flex justify-center items-center text-center pointer-events-auto cursor-pointer hover:opacity-80 transition-opacity" title="点击查看排单列表">
      <h1 id="song-title" class="text-xs md:text-lg font-bold text-white truncate tracking-wide drop-shadow-md">加载中...</h1>
      <svg class="w-4 h-4 ml-1 text-zinc-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
    </div>

    <!-- 右侧：操作按钮 (手机端只显示图标，隐藏文字) -->
    <div class="flex items-center justify-end gap-1.5 md:gap-3 flex-shrink-0">
      
      <!-- 指挥模式开关 -->
      <button id="btn-conductor" class="flex items-center gap-1.5 p-2 md:px-4 md:py-2.5 rounded-xl bg-zinc-800/80 text-zinc-400 hover:bg-zinc-700 hover:text-white border border-white/5 transition-all shadow-sm" title="开启指挥模式">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
        <span class="hidden md:inline text-sm font-semibold">指挥</span>
      </button>

      <!-- 演出模式按钮 (全屏) -->
      <button id="btn-lock" class="p-2 md:p-2.5 rounded-xl bg-zinc-800/80 text-zinc-300 hover:bg-zinc-700 hover:text-white border border-white/5 transition-all shadow-sm" title="全屏演出模式">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
      </button>

      <!-- 智能反色按钮 (月亮) -->
      <button id="btn-invert" class="p-2 md:p-2.5 rounded-xl bg-zinc-800/80 text-zinc-300 hover:bg-zinc-700 hover:text-white border border-white/5 transition-all shadow-sm" title="夜间反色模式">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
      </button>

      <!-- 标注开关 -->
      <button id="btn-draw" class="flex items-center gap-1.5 p-2 md:px-4 md:py-2.5 rounded-xl bg-zinc-800/80 text-zinc-300 hover:bg-zinc-700 hover:text-white border border-white/5 transition-all shadow-sm">
        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        <span class="hidden md:inline text-sm font-semibold">标注</span>
        <!-- 就是下面这行刚才被我不小心删了，导致 JS 报错 -->
        <span id="draw-status" class="hidden md:inline-block text-[10px] bg-zinc-950 text-zinc-400 px-1.5 py-0.5 rounded-full uppercase tracking-wider border border-white/10">OFF</span>
      </button>

      
      <!-- Sync 按钮 -->
      <button id="btn-sync" class="flex items-center gap-1.5 p-2 md:px-4 md:py-2.5 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white rounded-xl shadow-lg shadow-indigo-500/25 transition-all border border-indigo-400/30">
        <svg class="w-4 h-4 md:w-5 md:h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
        <span class="hidden md:inline text-sm font-bold">Sync</span>
      </button>
    </div>
  </header>


  <!-- 底部悬浮画笔工具栏 -->
  <div id="draw-tools" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-50 items-center gap-2 p-2 bg-zinc-800/95 backdrop-blur-2xl border border-white/10 rounded-full shadow-2xl">
    <button class="color-btn w-10 h-10 rounded-full bg-red-500 ring-2 ring-offset-2 ring-offset-zinc-800 ring-white transition-all shadow-sm hover:scale-110" data-color="rgba(239, 68, 68, 0.8 )" data-width="4" title="红笔"></button>
    <button class="color-btn w-10 h-10 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-offset-zinc-800 ring-transparent transition-all shadow-sm hover:scale-110" data-color="rgba(59, 130, 246, 0.8)" data-width="4" title="蓝笔"></button>
    <button class="color-btn w-10 h-10 rounded-full bg-zinc-900 border border-zinc-600 ring-2 ring-offset-2 ring-offset-zinc-800 ring-transparent transition-all shadow-sm hover:scale-110" data-color="rgba(30, 41, 59, 0.8)" data-width="4" title="黑笔"></button>
    <button class="color-btn w-10 h-10 rounded-full bg-yellow-400 ring-2 ring-offset-2 ring-offset-zinc-800 ring-transparent transition-all shadow-sm flex items-center justify-center hover:scale-110" data-color="rgba(253, 224, 71, 0.8)" data-width="20" title="高亮笔">
     <span class="text-[11px] font-black text-yellow-900">粗</span>
    </button>

    
    <div class="w-px h-8 bg-white/10 mx-2"></div>
    
    <button id="btn-eraser" class="p-2.5 rounded-full text-zinc-400 hover:bg-zinc-700 hover:text-white ring-2 ring-transparent transition-all" title="橡皮擦">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
    </button>
    <button id="btn-clear" class="p-2.5 rounded-full text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-colors" title="清空本页">
      <span class="text-xs font-bold px-1">清空</span>
    </button>
  </div>

  <!-- 主体乐谱查看区 -->
  <!-- 关键修复：slide-container 必须作为 canvas 的绝对定位参考系 -->
  <!-- 主体乐谱查看区 -->
  <main id="slide-container" class="flex-1 relative w-full h-full overflow-hidden bg-zinc-950 flex justify-center items-center">
    
    <!-- 左右翻页按钮 -->
    <button id="btn-prev" class="fixed left-6 top-1/2 -translate-y-1/2 z-40 bg-zinc-800/40 hover:bg-zinc-700/80 text-white/70 hover:text-white p-4 rounded-full backdrop-blur-md border border-white/10 transition-all hidden md:block shadow-xl">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
    </button>
    <button id="btn-next" class="fixed right-6 top-1/2 -translate-y-1/2 z-40 bg-zinc-800/40 hover:bg-zinc-700/80 text-white/70 hover:text-white p-4 rounded-full backdrop-blur-md border border-white/10 transition-all hidden md:block shadow-xl">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
    </button>

    <!-- 🌟 新增：zoom-wrapper 缩放包裹层 -->
    <div id="zoom-wrapper" class="relative w-full h-full flex justify-center items-center origin-center">
      <!-- 乐谱图片 -->
      <img id="score-image" src="" alt="Score" class="max-w-full max-h-full object-contain bg-white shadow-2xl shadow-black/60 rounded-xl select-none pointer-events-none z-10" draggable="false">
      
      <!-- 🌟 核心修复：加上了 inset-0 m-auto max-w-full max-h-full object-contain，让画板和图片完美焊死 -->
      <canvas id="draw-canvas" class="absolute inset-0 m-auto max-w-full max-h-full object-contain pointer-events-none z-20 mix-blend-multiply rounded-xl"></canvas>

    </div>
    
  </main>


  <script type="module" src="src/app.js"></script>

  <script>
    // ==========================================
    // 【A】沉浸模式 (Immersive Mode)
    // ==========================================
    const header = document.querySelector('header');
    const slideContainer = document.getElementById('slide-container');
    const drawTools = document.getElementById('draw-tools');
    
    slideContainer.addEventListener('click', (e) => {
      // 如果处于演出模式(已锁定)，或者点击的是按钮，则不触发隐藏/显示
      if (slideContainer.dataset.locked === "true" || e.target.closest('button')) return;
      
      // 丝滑隐藏/显示顶部导航栏
      header.classList.toggle('opacity-0');
      header.classList.toggle('pointer-events-none');
      header.classList.toggle('-translate-y-8');

      // 如果底部画笔工具栏正在显示，也一并隐藏/显示
      if (!drawTools.classList.contains('hidden')) {
        drawTools.classList.toggle('opacity-0');
        drawTools.classList.toggle('pointer-events-none');
        drawTools.classList.toggle('translate-y-12');
      }
    });

    // ==========================================
    // 【B】防息屏功能 (Wake Lock API)
    // ==========================================
    let wakeLock = null;
    const requestWakeLock = async () => {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('☀️ 防息屏已激活，弥撒中绝不黑屏！');
        }
      } catch (err) {
        console.error('防息屏请求失败:', err);
      }
    };
    
    // 当用户切换 App 再切回来时，重新激活防息屏
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
    
    // ==========================================
    // 【C】智能反色 (Smart Invert)
    // ==========================================
    const btnInvert = document.getElementById('btn-invert');
    const scoreImg = document.getElementById('score-image');
    
    btnInvert.addEventListener('click', () => {
      // 切换 Tailwind 的内置滤镜 class
      // invert: 反转颜色 (白变黑)
      // hue-rotate-180: 修正色相 (保证彩色部分不变色太离谱)
      // brightness-90: 稍微降低一点亮度，让纯白字不那么刺眼
      scoreImg.classList.toggle('invert');
      scoreImg.classList.toggle('hue-rotate-180');
      scoreImg.classList.toggle('brightness-90');
      
      // 按钮视觉反馈
      btnInvert.classList.toggle('text-yellow-400');
      btnInvert.classList.toggle('text-zinc-300');
    });
    // ==========================================
    // 【D】演出模式 (Performance Mode) + 自动全屏
    // ==========================================
    const btnLock = document.getElementById('btn-lock');
    const btnUnlock = document.getElementById('btn-unlock');
    const drawCanvas = document.getElementById('draw-canvas');
    
    btnLock.addEventListener('click', () => {
      // 1. 强制隐藏顶部导航栏和底部画笔栏
      header.classList.add('opacity-0', 'pointer-events-none', '-translate-y-8');
      if (!drawTools.classList.contains('hidden')) {
        drawTools.classList.add('opacity-0', 'pointer-events-none', 'translate-y-12');
      }
      
      // 2. 禁用画板的触摸事件，彻底防止误触画出线条
      drawCanvas.style.pointerEvents = 'none';
      
      // 3. 给容器打上“已锁定”标记，禁用点击呼出菜单
      slideContainer.dataset.locked = "true";
      
      // 4. 显示右上角的半透明解锁按钮
      btnUnlock.classList.remove('hidden');

      // 🌟 5. 自动进入全屏模式 (兼容安卓和 iPad)
      const docEl = document.documentElement;
      if (docEl.requestFullscreen) {
        docEl.requestFullscreen().catch(err => console.log("全屏被拒绝:", err));
      } else if (docEl.webkitRequestFullscreen) { /* Safari/iPadOS */
        docEl.webkitRequestFullscreen();
      }
    });

    btnUnlock.addEventListener('click', () => {
      // 1. 恢复顶部导航栏
      header.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-8');
      
      // 2. 恢复画板状态
      drawCanvas.style.pointerEvents = '';
      
      // 3. 解除锁定标记
      slideContainer.dataset.locked = "false";
      
      // 4. 隐藏解锁按钮
      btnUnlock.classList.add('hidden');

      // 🌟 5. 自动退出全屏模式
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    });


    btnUnlock.addEventListener('click', () => {
      // 1. 恢复顶部导航栏
      header.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-8');
      
      // 2. 恢复画板状态 (交还给 app.js 原本的逻辑控制)
      drawCanvas.style.pointerEvents = '';
      
      // 3. 解除锁定标记
      slideContainer.dataset.locked = "false";
      
      // 4. 隐藏解锁按钮
      btnUnlock.classList.add('hidden');
    });


    // 页面加载时立刻请求
    requestWakeLock();
  </script>
  
  <!-- 快速跳转弹窗 -->
  <div id="song-list-modal" class="fixed inset-0 bg-black/80 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-end md:items-center justify-center backdrop-blur-sm">
    <div class="bg-zinc-900 w-full md:w-96 max-h-[70vh] rounded-t-2xl md:rounded-2xl flex flex-col overflow-hidden transform translate-y-full md:translate-y-0 md:scale-95 transition-all duration-300" id="song-list-content">
      <div class="p-4 border-b border-white/10 flex justify-between items-center bg-zinc-800/50">
        <h3 class="text-white font-bold text-lg">排单曲目</h3>
        <button id="btn-close-song-list" class="p-2 text-zinc-400 hover:text-white hover:bg-white/10 rounded-full transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div id="song-list-container" class="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
        <!-- JS 渲染列表 -->
      </div>
    </div>
  </div>

  <!-- 翻页提示 (Toast) 悬浮在左下角 -->
  <div id="toast-notification" class="fixed bottom-8 left-6 z-[70] bg-zinc-900/90 backdrop-blur-md border border-white/10 text-white px-4 py-3 rounded-xl shadow-2xl transform translate-y-4 opacity-0 pointer-events-none transition-all duration-300 flex flex-col max-w-[80vw] md:max-w-md">
    <span id="toast-number" class="text-indigo-400 font-black text-[10px] tracking-wider mb-1"></span>
    <!-- 🌟 核心修复：去掉了 truncate，加上了 break-words，长歌名会自动换行，绝不遮挡！ -->
    <span id="toast-title" class="font-bold text-sm md:text-base leading-snug break-words whitespace-normal"></span>
  </div>


</body>
</html>
